basePath: /api/v1
definitions:
  model.Booking:
    properties:
      car:
        $ref: '#/definitions/model.Car'
      car_id:
        type: integer
      customer:
        $ref: '#/definitions/model.Customer'
      customer_id:
        type: integer
      end_rent:
        type: string
      finished:
        type: boolean
      id:
        type: integer
      start_rent:
        type: string
      total_cost:
        type: integer
    type: object
  model.BookingRequest:
    properties:
      car_id:
        example: 2
        type: integer
      customer_id:
        example: 1
        type: integer
      end_rent:
        example: "2026-03-15T09:00:00Z"
        type: string
      start_rent:
        example: "2026-03-13T09:00:00Z"
        type: string
    type: object
  model.Car:
    properties:
      daily_rent:
        type: integer
      id:
        type: integer
      name:
        type: string
      stock:
        type: integer
    type: object
  model.CarRequest:
    properties:
      daily_rent:
        example: 350000
        type: integer
      name:
        example: Toyota Avanza
        type: string
      stock:
        example: 5
        type: integer
    type: object
  model.Customer:
    properties:
      id:
        type: integer
      name:
        type: string
      nik:
        type: string
      phone_number:
        type: string
    type: object
  model.CustomerRequest:
    properties:
      name:
        example: Eko Purwanto
        type: string
      nik:
        example: "87690234567"
        type: string
      phone_number:
        example: "08769788865"
        type: string
    type: object
  model.UpdateBookingRequest:
    properties:
      car_id:
        example: 2
        type: integer
      customer_id:
        example: 1
        type: integer
      end_rent:
        example: "2026-03-15T09:00:00Z"
        type: string
      finished:
        example: false
        type: boolean
      start_rent:
        example: "2026-03-13T09:00:00Z"
        type: string
    type: object
host: localhost:3000
info:
  contact: {}
  description: Simple Car Rental API
  title: Car Rental API
  version: "1.0"
paths:
  /bookings:
    get:
      description: Retrieve list of all bookings
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Booking'
            type: array
      summary: Get all bookings
      tags:
      - bookings
    post:
      consumes:
      - application/json
      description: Create a new booking record
      parameters:
      - description: Booking Data
        in: body
        name: booking
        required: true
        schema:
          $ref: '#/definitions/model.BookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Booking'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create new booking
      tags:
      - bookings
  /bookings/{id}:
